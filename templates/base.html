{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festus | Backend Engineer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

    <!-- Your CSS — loads last so it overrides Bootstrap -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top custom-navbar">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">festus<span>.</span>dev</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation"
                style="border-color: var(--border-color); filter: invert(1);">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-1">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
                    <li class="nav-item ms-2">
                        <a class="nav-link" href="#contact"
                            style="background: var(--accent-color); color: #fff !important; padding: 7px 18px; border-radius: var(--radius-pill); font-size: 0.875rem; font-weight: 500;">
                            Contact
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <footer style="border-top: 1px solid var(--border-color); padding: 2rem 0; margin-top: 2rem;">
        <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between gap-3">
            <span style="font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--heading-color);">
                festus<span style="color: var(--accent-color);">.</span>dev
            </span>
            <p style="color: var(--muted-color); font-size: 0.82rem; margin: 0;">
                © 2026 Built with Django by Festus
            </p>
            <div class="d-flex gap-3">
                <a href="https://github.com/Drealpappi" target="_blank"
                    style="color: var(--muted-color); font-size: 0.82rem; text-decoration: none; display: flex; align-items: center; gap: 5px; transition: color 0.2s;">
                    <i class="ti ti-brand-github" style="font-size: 16px;" aria-hidden="true"></i> GitHub
                </a>
                <a href="mailto:adelekanf7@gmail.com"
                    style="color: var(--muted-color); font-size: 0.82rem; text-decoration: none; display: flex; align-items: center; gap: 5px; transition: color 0.2s;">
                    <i class="ti ti-mail" style="font-size: 16px;" aria-hidden="true"></i> Email
                </a>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Navbar scroll effect -->
    <script>
        const navbar = document.querySelector('.custom-navbar');
        window.addEventListener('scroll', () => {
            navbar.classList.toggle('scrolled', window.scrollY > 20);
        });
    </script>

</body>
</html>
